<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivaan.exe</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
/* === SAME STYLE YOU SHOULD ALSO USE IN 404 === */

body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: 'Orbitron', sans-serif;
}

/* scanlines */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,200,0.05),
    rgba(0,255,200,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

/* nav */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #00ffcc33;
  background: rgba(0,0,0,0.7);
}

.logo {
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
}

/* hero */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
}

.hero h1 {
  text-shadow: 0 0 20px #00ffcc;
}

/* sections */
.section {
  padding: 100px 20px;
  text-align: center;
}

.title {
  color: #ff00ff;
}

/* ref banner */
#refBox {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  border: 1px solid #00ffcc;
  padding: 10px 15px;
  display: none;
}
</style>
</head>

<body>

<nav>
  <div class="logo">VIVAAN.EXE</div>
</nav>

<section class="hero">
  <h1>> booting vivaan...</h1>
  <p>code • music • minecraft</p>
</section>

<section class="section">
  <div class="title">ABOUT</div>
  <p>
    i build stuff, break stuff, fix it again.<br>
    also make music and spend too long in minecraft worlds.
  </p>
</section>

<div id="refBox"></div>

<script>
const ref = new URLSearchParams(window.location.search).get("ref");

if (ref) {
  const box = document.getElementById("refBox");
  box.style.display = "block";

  const messages = [
    "you spawned here from " + ref,
    "ref detected: " + ref,
    "portal opened from " + ref,
    "yo... you came from " + ref
  ];

  box.textContent = messages[Math.floor(Math.random() * messages.length)];
}
</script>

</body>
</html>
